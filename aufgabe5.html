<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If Bedingungen</title>
</head>
<body>
    
    <div id="zid"></div>

    <script>

        const container = document.getElementById('zid');
        container.innerHTML += "Start<br>"

        //Zufallszahl zwischen 0 und 99
        let ran = Math.floor(Math.random()*100)
    // Aufgabe 1
    // Wenn die Zahl kleiner ist als 20  gib aus "Mini"
        if(ran < 20) {

            container.innerHTML += "Mini<br>"
        }
    // Wenn die Zahl zw. 20 und 50 ist gib aus "Medium"
        if(ran >= 20 && ran <= 50) {

            container.innerHTML += "Medium<br>"

        }

    // Wenn die Zahl größer als 50 ist gib aus "Large"
    if(ran >= 50) {

        container.innerHTML += "Large<br>"

    }

    // Aufgabe 2
    // Wenn die Zahl kleiner gleich 7 ist gib aus "Mini"
        if(ran <= 7){

            container.innerHTML += ran + "Mini<br>"

        }

    // Wenn die Zahl zwischen 7 und 90 ist gib  aus "Medium"
       if(ran >= 7 && ran <= 90){

            container.innerHTML += ran + "Medium<br>"

        }

    // Wenn die Zahl größer als 90 ist gib aus "Large"
        if(ran <= 90){

            container.innerHTML += ran + "Large<br>"

        }


    </script>

</body>
</html>
